<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>H.U.M.A.N!</title>
<link rel="icon" type="image/jpeg" href="favicon.jpg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=VT323&display=swap');

  :root {
    --bg: #0a0c0f; --panel: #0f1318; --border: #1e2a1e; --accent: #00ff41;
    --accent2: #ff6b00; --accent3: #00cfff; --dim: #2a3a2a; --text: #b8d4b8;
    --textdim: #4a6a4a; --error: #ff3333; --warning: #ffcc00;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:var(--bg); color:var(--text); font-family:'Share Tech Mono',monospace; overflow:hidden; }
  body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,65,0.015) 2px, rgba(0,255,65,0.015) 4px); pointer-events:none; z-index:9999; }

  #app { display:grid; grid-template-rows:52px 1fr; grid-template-columns:1fr 560px; height:100vh; }
  #header { grid-column:1/-1; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 20px; gap:24px; position:relative; }
  #header::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:linear-gradient(90deg, transparent, var(--accent), transparent); }
  .logo { font-family:'Orbitron',monospace; font-weight:900; font-size:18px; color:var(--accent); letter-spacing:4px; text-shadow:0 0 20px rgba(0,255,65,0.5); }
  .logo span { color:var(--accent2); }
  .header-info { display:flex; gap:24px; margin-left:auto; font-size:11px; color:var(--textdim); letter-spacing:2px; }
  .header-info .val { color:var(--accent3); font-family:'VT323',monospace; font-size:15px; }
  #viewport { background:#000; position:relative; overflow:hidden; border-right:1px solid var(--border); display:flex; align-items:center; justify-content:center; }
  #grid-container { position:relative; width:min(70vh,70vw); aspect-ratio:1/1; background:#000; }
  #video-bg { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:0; }
  #video-fg { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:1; }
  #goal-overlay { position:absolute; top:0; left:0; width:100%; height:100%; z-index:2; pointer-events:none; }
  .coord-labels-x, .coord-labels-y { position:absolute; display:flex; font-size:13px; color:var(--textdim); font-family:'VT323',monospace; z-index:3; text-shadow:0 0 4px black; }
  .coord-labels-x { top:-20px; left:0; width:100%; justify-content:space-around; }
  .coord-labels-y { left:-20px; top:0; height:100%; flex-direction:column; justify-content:space-around; align-items:center; }
  #status-bar { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); background:rgba(10,12,15,0.9); border:1px solid var(--dim); padding:6px 20px; font-size:12px; color:var(--textdim); white-space:nowrap; backdrop-filter:blur(4px); z-index:10; }
  #status-bar .status-val { color:var(--accent); }
  #dir-indicator { position:absolute; top:12px; left:12px; width:48px; height:48px; border:1px solid var(--dim); background:rgba(10,12,15,0.9); display:flex; align-items:center; justify-content:center; font-size:24px; backdrop-filter:blur(4px); z-index:10; }
  #editor-panel { display:grid; grid-template-rows:40px 1fr 52px 140px; background:var(--panel); overflow:hidden; }
  #editor-tabs { display:flex; align-items:center; border-bottom:1px solid var(--border); padding:0 12px; gap:8px; background:rgba(0,0,0,0.3); }
  .tab { font-size:10px; letter-spacing:2px; color:var(--textdim); padding:4px 10px; border-bottom:2px solid transparent; cursor:pointer; transition:all 0.1s; }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .tab-flash { animation:flashText 1s ease-in-out infinite; }
  @keyframes flashText { 0%,100%{opacity:1} 50%{opacity:0.3; text-shadow:0 0 4px var(--accent2);} }
  .tab-dot { width:6px; height:6px; border-radius:50%; background:var(--accent2); display:inline-block; margin-right:6px; animation:blink 2s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .editor-wrapper { position:relative; overflow:hidden; background:#0a0c0f; height:100%; }
  .editor-pane { position:absolute; top:0; left:0; width:100%; height:100%; overflow:auto; background:#0a0c0f; }
  .editor-pane.hidden { display:none; }
  .code-editor-container { position:relative; height:100%; overflow:hidden; }
  #line-numbers { position:absolute; left:0; top:0; width:44px; padding:12px 0; text-align:right; font-size:12px; line-height:20px; color:var(--textdim); background:rgba(0,0,0,0.5); border-right:1px solid var(--border); user-select:none; font-family:'Share Tech Mono',monospace; pointer-events:none; z-index:2; }
  #code-input, #code-highlight { position:absolute; left:44px; right:0; top:0; bottom:0; margin:0; padding:12px; font-family:'Share Tech Mono',monospace; font-size:13px; line-height:20px; tab-size:4; border:none; background:transparent; white-space:pre-wrap; word-break:break-word; overflow:auto; }
  #code-input { color:transparent; caret-color:var(--accent); resize:none; outline:none; z-index:3; }
  #code-highlight { pointer-events:none; z-index:1; color:var(--text); background:transparent; }
  .kw { color:#cc88ff; } .builtin { color:var(--accent2); font-weight:bold; } .cm { color:#5a7a5a; font-style:italic; }
  .instructions-container { padding:16px; font-family:'Share Tech Mono',monospace; font-size:13px; line-height:1.5; overflow-y:auto; }
  .instructions-container .comment-line { color:#5a7a5a; white-space:pre-wrap; }
  .instructions-container .instr-heading { color:var(--accent); font-family:'Orbitron',monospace; font-size:11px; letter-spacing:3px; margin:14px 0 6px; }
  .instructions-container .instr-line { color:var(--text); white-space:pre-wrap; padding-left:8px; }
  #controls-bar { border-top:1px solid var(--border); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:flex-end; padding:0 12px; gap:12px; background:rgba(0,0,0,0.4); }
  #btn-run { background:linear-gradient(135deg,#003300,#005500); border:1px solid var(--accent); color:var(--accent); font-family:'Orbitron',monospace; font-weight:700; font-size:12px; letter-spacing:3px; padding:8px 20px; cursor:pointer; }
  #btn-run.running { background:linear-gradient(135deg,#330000,#550000); border-color:var(--error); color:var(--error); }
  #btn-clear { background:transparent; border:1px solid var(--dim); color:var(--textdim); font-family:'Share Tech Mono',monospace; font-size:10px; padding:6px 12px; cursor:pointer; }
  #console { background:rgba(0,0,0,0.6); display:flex; flex-direction:column; overflow:hidden; }
  #console-header { flex-shrink:0; font-size:9px; letter-spacing:2px; color:var(--textdim); padding:8px 12px; display:flex; justify-content:space-between; border-bottom:1px solid var(--dim); }
  #console-body { flex:1; overflow-y:auto; padding:8px 12px; font-size:11px; line-height:18px; }
  #console-clear { cursor:pointer; } #console-clear:hover { color:var(--accent); }
  .log-line { color:var(--textdim); } .log-success { color:var(--accent); } .log-error { color:var(--error); }
  .log-warn { color:var(--warning); } .log-info { color:var(--accent3); } .log-exec { color:#cc88ff; }
  #overlay { position:fixed; inset:0; background:rgba(0,0,0,0.92); display:flex; align-items:center; justify-content:center; z-index:1000; opacity:0; pointer-events:none; transition:opacity 0.3s; flex-direction:column; gap:24px; }
  #overlay.show { opacity:1; pointer-events:all; }
  .overlay-title { font-family:'Orbitron',monospace; font-size:36px; font-weight:900; letter-spacing:8px; }
  .overlay-title.win { color:var(--accent); text-shadow:0 0 40px rgba(0,255,65,0.6); }
  .overlay-sub { font-size:13px; letter-spacing:3px; color:var(--textdim); }
  #btn-next { background:transparent; border:1px solid var(--accent); color:var(--accent); font-family:'Orbitron',monospace; font-weight:700; font-size:13px; letter-spacing:4px; padding:12px 32px; cursor:pointer; }
  #run-progress { position:absolute; bottom:-2px; left:0; height:2px; background:var(--accent); width:0%; transition:width 0.1s linear; z-index:20; }
</style>
</head>
<body>

<div id="app">
  <header id="header">
    <div class="logo">H.<span>U</span>.M.<span>A</span>.N.</div>
    <div style="width:1px; height:24px; background:var(--dim)"></div>
    <div style="font-size:10px; letter-spacing:2px; color:var(--textdim)">NEURAL PROTOCOL</div>
    <div class="header-info">
      <div>LEVEL&nbsp;<span class="val" id="hdr-level">01</span></div>
      <div>POS&nbsp;<span class="val" id="hdr-pos">0,0</span></div>
      <div>FACING&nbsp;<span class="val" id="hdr-facing">NORTH</span></div>
      <div>STEPS&nbsp;<span class="val" id="hdr-steps">0</span></div>
    </div>
  </header>

  <div id="viewport">
    <div id="dir-indicator">↑</div>
    <div id="grid-container">
      <video id="video-bg" muted playsinline autoplay loop></video>
      <video id="video-fg" muted playsinline autoplay></video>
      <canvas id="goal-overlay"></canvas>
      <div class="coord-labels-x"><span>A</span><span>B</span><span>C</span><span>D</span></div>
      <div class="coord-labels-y"><span>1</span><span>2</span><span>3</span><span>4</span></div>
      <div id="run-progress"></div>
    </div>
    <div id="status-bar">
      POS: <span class="status-val" id="st-pos">A1</span> &nbsp;|&nbsp;
      FACING: <span class="status-val" id="st-facing">NORTH</span> &nbsp;|&nbsp;
      TARGET: <span class="status-val" id="st-target">--</span> &nbsp;|&nbsp;
      STATUS: <span class="status-val" id="st-status">IDLE</span>
    </div>
  </div>

  <div id="editor-panel">
    <div id="editor-tabs">
      <div class="tab active" data-tab="code">main.py</div>
      <div class="tab" data-tab="instructions" id="instructions-tab">instructions.txt</div>
      <div style="margin-left:auto; font-size:9px; letter-spacing:2px; color:var(--textdim)">PYTHON 3.KINDA</div>
    </div>
    <div class="editor-wrapper">
      <div id="code-pane" class="editor-pane">
        <div class="code-editor-container">
          <div id="line-numbers" class="line-numbers"></div>
          <div id="code-highlight"></div>
          <textarea id="code-input" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" placeholder="# Write your code here..."></textarea>
        </div>
      </div>
      <div id="instructions-pane" class="editor-pane hidden">
        <div class="instructions-container" id="instructions-content"></div>
      </div>
    </div>
    <div id="controls-bar">
      <button id="btn-clear">⟳ RESET</button>
      <button id="btn-run">▶ RUN</button>
    </div>
    <div id="console">
      <div id="console-header"><span>⎯ CONSOLE LOG ⎯</span><span id="console-clear">CLEAR</span></div>
      <div id="console-body"></div>
    </div>
  </div>
</div>

<div id="overlay">
  <div class="overlay-title win">OBJECTIVE COMPLETE</div>
  <div class="overlay-sub" id="overlay-sub">UNIT REACHED TARGET COORDINATES</div>
  <button id="btn-next" onclick="nextLevel()">⟫ NEXT LEVEL ⟪</button>
</div>

<script>
  // ==============================================================
  // GAME STATE
  // ==============================================================
  const DIRS = ['N','E','S','W'];
  const DIR_ARROWS = { N:'↑', E:'→', S:'↓', W:'←' };
  const DIR_NAMES = { N:'NORTH', E:'EAST', S:'SOUTH', W:'WEST' };
  const MOVE = { N: [0,-1], E: [1,0], S: [0,1], W: [-1,0] };

  let state = {
    level: 1,
    pos: {col:0, row:0},
    dir: 'N',
    goal: {col:3, row:3},
    steps: 0,
    running: false
  };

  // ==============================================================
  // VIDEO SYSTEM — background + simple foreground
  // ==============================================================
  const bgVideo = document.getElementById('video-bg');
  const fgVideo = document.getElementById('video-fg');
  
  // Set background video (loops continuously)
  bgVideo.src = 'videos/background.mp4';
  bgVideo.loop = true;
  bgVideo.load();
  bgVideo.play().catch(() => {});

  function getVideoPath(col, row, action, dir = null) {
    if (dir && (action === 'idle' || action === 'forward' || action === 'turn_left' || action === 'turn_right')) {
      return `videos/cell_${col}_${row}_${action}_${dir}.mp4`;
    }
    return `videos/cell_${col}_${row}_${action}.mp4`;
  }

  // Play a clip once, then call callback when ended
  function playClip(src, callback) {
    fgVideo.pause();
    fgVideo.src = src;
    fgVideo.loop = false;
    fgVideo.load();
    fgVideo.play().catch(() => {});
    const onEnd = () => {
      fgVideo.removeEventListener('ended', onEnd);
      if (callback) callback();
    };
    fgVideo.addEventListener('ended', onEnd);
    // Safety timeout
    setTimeout(() => {
      if (!fgVideo.ended && !fgVideo.loop) {
        fgVideo.removeEventListener('ended', onEnd);
        if (callback) callback();
      }
    }, 3000);
  }

  // Play idle for a specific cell (foreground, but background keeps running)
  function playIdleForCell(col, row, dir) {
    const src = getVideoPath(col, row, 'idle', dir);
    playClip(src, null);
  }

  // Play action, then idle for target cell
  function playAction(actionCol, actionRow, action, actionDir, duration, afterCol, afterRow, afterDir, callback) {
    const actionSrc = getVideoPath(actionCol, actionRow, action, actionDir);
    const idleSrc = getVideoPath(afterCol, afterRow, 'idle', afterDir);
    playClip(actionSrc, () => {
      playClip(idleSrc, callback);
    });
  }

  function playMoveForward(fromCol, fromRow, dir, toCol, toRow, duration, callback) {
    playAction(fromCol, fromRow, 'forward', dir, duration, toCol, toRow, dir, callback);
  }
  function playTurnLeft(col, row, oldDir, newDir, duration, callback) {
    playAction(col, row, 'turn_left', oldDir, duration, col, row, newDir, callback);
  }
  function playTurnRight(col, row, oldDir, newDir, duration, callback) {
    playAction(col, row, 'turn_right', oldDir, duration, col, row, newDir, callback);
  }
  function playSuccess(col, row, duration, callback) {
    playAction(col, row, 'success', null, duration, col, row, state.dir, callback);
  }
  function playError(col, row, duration, callback) {
    playAction(col, row, 'error', null, duration, col, row, state.dir, callback);
  }

  // ==============================================================
  // OVERLAY (orange ring only)
  // ==============================================================
  const canvas = document.getElementById('goal-overlay');
  let ctx;

  function resizeCanvas() {
    const container = document.getElementById('grid-container');
    const rect = container.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    drawGoalOverlay();
  }

  function drawGoalOverlay() {
    if (!ctx) return;
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    const cellW = w / 4, cellH = h / 4;
    const goalX = state.goal.col * cellW, goalY = state.goal.row * cellH;
    ctx.beginPath();
    ctx.arc(goalX + cellW/2, goalY + cellH/2, Math.min(cellW, cellH) * 0.3, 0, 2 * Math.PI);
    ctx.strokeStyle = '#ff6b00';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,107,0,0.4)';
    ctx.fill();
  }

  function refreshUI() { drawGoalOverlay(); updateHUD(); }

  function updateHUD() {
    document.getElementById('hdr-level').textContent = String(state.level).padStart(2,'0');
    document.getElementById('hdr-pos').textContent = `${state.pos.col},${state.pos.row}`;
    document.getElementById('hdr-facing').textContent = DIR_NAMES[state.dir];
    document.getElementById('hdr-steps').textContent = state.steps;
    document.getElementById('st-pos').textContent = `${colName(state.pos.col)}${state.pos.row+1}`;
    document.getElementById('st-facing').textContent = DIR_NAMES[state.dir];
    document.getElementById('st-target').textContent = `${colName(state.goal.col)}${state.goal.row+1}`;
    document.getElementById('dir-indicator').textContent = DIR_ARROWS[state.dir];
  }

  function colName(c) { return ['A','B','C','D'][c]; }

  // ==============================================================
  // INTERPRETER UTILITIES (simplified but fully functional)
  // ==============================================================
  function serializeVal(val) {
    if (val === null) return 'null';
    if (val === true) return 'true';
    if (val === false) return 'false';
    if (Array.isArray(val)) return '[' + val.map(serializeVal).join(',') + ']';
    if (typeof val === 'string') return JSON.stringify(val);
    return String(val);
  }

  function evaluateExpression(expr, scope) {
    expr = expr.trim();
    const lenMatch = expr.match(/^len\((.+)\)$/);
    if (lenMatch) {
      const inner = evaluateExpression(lenMatch[1], scope);
      if (Array.isArray(inner)) return inner.length;
      if (typeof inner === 'string') return inner.length;
      return 0;
    }
    const tupleMatch = expr.match(/^\((.+)\)$/);
    if (tupleMatch) {
      const inner = tupleMatch[1];
      const parts = splitTopLevel(inner, ',');
      if (parts.length >= 2) return parts.map(p => evaluateExpression(p.trim(), scope));
    }
    const listMatch = expr.match(/^\[(.+)?\]$/);
    if (listMatch && listMatch[1] !== undefined) {
      const parts = splitTopLevel(listMatch[1], ',');
      return parts.map(p => evaluateExpression(p.trim(), scope));
    }
    if (expr === '[]') return [];
    const inMatch = expr.match(/^(.+?)\s+in\s+(.+)$/);
    if (inMatch) {
      const needle = evaluateExpression(inMatch[1].trim(), scope);
      const haystack = evaluateExpression(inMatch[2].trim(), scope);
      if (Array.isArray(haystack)) return haystack.some(el => JSON.stringify(el) === JSON.stringify(needle));
      return false;
    }
    const notInMatch = expr.match(/^(.+?)\s+not\s+in\s+(.+)$/);
    if (notInMatch) {
      const needle = evaluateExpression(notInMatch[1].trim(), scope);
      const haystack = evaluateExpression(notInMatch[2].trim(), scope);
      if (Array.isArray(haystack)) return !haystack.some(el => JSON.stringify(el) === JSON.stringify(needle));
      return true;
    }
    let replaced = expr.replace(/\b([a-zA-Z_][a-zA-Z0-9_]*)\b/g, (match) => {
      if (match === 'True') return 'true';
      if (match === 'False') return 'false';
      if (match === 'None') return 'null';
      if (match === 'and') return '&&';
      if (match === 'or') return '||';
      if (match === 'not') return '!';
      if (match === 'current_position') return `[${state.pos.col}, ${state.pos.row}]`;
      if (match === 'goal_position') return `[${state.goal.col}, ${state.goal.row}]`;
      if (match in scope) return serializeVal(scope[match]);
      return match;
    });
    try { return new Function('return (' + replaced + ')')(); } catch(e) { return 0; }
  }

  function splitTopLevel(str, delim) {
    const parts = [];
    let depth = 0, current = '';
    for (let ch of str) {
      if (ch === '(' || ch === '[') depth++;
      else if (ch === ')' || ch === ']') depth--;
      if (ch === delim && depth === 0) { parts.push(current); current = ''; }
      else current += ch;
    }
    if (current.trim() !== '') parts.push(current);
    return parts;
  }

  function resolveIndexedTarget(expr, scope) {
    let match = expr.match(/^([a-zA-Z_][a-zA-Z0-9_]*)((?:\[[^\]]+\])+)$/);
    if (!match) return { target: null, indices: null };
    let base = match[1];
    let indicesPart = match[2];
    let indices = [];
    let remaining = indicesPart;
    while (remaining.length > 0) {
      let idxMatch = remaining.match(/^\[([^\]]+)\]/);
      if (!idxMatch) break;
      indices.push(evaluateExpression(idxMatch[1], scope));
      remaining = remaining.slice(idxMatch[0].length);
    }
    if (!(base in scope)) return { target: null, indices: null };
    return { target: scope[base], indices: indices };
  }

  function assignValue(left, value, scope) {
    let idxTarget = resolveIndexedTarget(left, scope);
    if (idxTarget.target !== null && idxTarget.indices !== null) {
      let obj = idxTarget.target;
      for (let i = 0; i < idxTarget.indices.length - 1; i++) {
        let idx = idxTarget.indices[i];
        if (obj[idx] === undefined) obj[idx] = [];
        obj = obj[idx];
      }
      obj[idxTarget.indices[idxTarget.indices.length - 1]] = value;
      return true;
    } else if (left.match(/^[a-zA-Z_][a-zA-Z0-9_]*$/)) {
      scope[left] = value;
      return true;
    }
    return false;
  }

  function handleMethodCall(stripped, scope) {
    const match = stripped.match(/^(.+?)\.(append|pop)\(([^)]*)\)$/);
    if (!match) return null;
    const objExpr = match[1].trim();
    const method = match[2];
    const argExpr = match[3].trim();
    const obj = evaluateExpression(objExpr, scope);
    if (!Array.isArray(obj)) return null;
    if (method === 'append') {
      const val = evaluateExpression(argExpr, scope);
      obj.push(val);
      return true;
    } else if (method === 'pop') {
      if (argExpr === '') return obj.pop();
      const idx = evaluateExpression(argExpr, scope);
      if (typeof idx === 'number' && idx >= 0 && idx < obj.length) return obj.splice(idx, 1)[0];
      return null;
    }
    return null;
  }

  // ==============================================================
  // INTERPRETER
  // ==============================================================
  function interpret(code, actions, errors, scope, depth, limit) {
    if (depth > 100) throw new Error('Recursion limit exceeded');
    const lines = code.split('\n');
    let i = 0;
    while (i < lines.length) {
      if (actions.length >= limit) throw new Error('Step limit (500) exceeded');
      const line = lines[i];
      const stripped = line.trimStart();
      if (!stripped || stripped.startsWith('#')) { i++; continue; }
      const defMatch = stripped.match(/^def\s+(\w+)\s*\(\)\s*:/);
      if (defMatch) {
        const funcName = defMatch[1];
        const indent = line.length - stripped.length;
        const bodyLines = [];
        i++;
        while (i < lines.length) {
          const l2 = lines[i];
          if (l2.trim() === '') { bodyLines.push(''); i++; continue; }
          if (l2.length - l2.trimStart().length <= indent) break;
          bodyLines.push(l2.slice(indent + 4));
          i++;
        }
        if (!scope.__funcs__) scope.__funcs__ = {};
        scope.__funcs__[funcName] = bodyLines.join('\n');
        continue;
      }
      const callMatch = stripped.match(/^(\w+)\(\)$/);
      if (callMatch && !['move_forward','turn_left','turn_right','len'].includes(callMatch[1])) {
        const funcName = callMatch[1];
        if (scope.__funcs__ && scope.__funcs__[funcName]) {
          interpret(scope.__funcs__[funcName], actions, errors, { ...scope, __funcs__: scope.__funcs__ }, depth+1, limit);
        } else errors.push(`Function '${funcName}' not defined`);
        i++; continue;
      }
      const methodResult = handleMethodCall(stripped, scope);
      if (methodResult !== null) { i++; continue; }
      const forMatch = stripped.match(/^for\s+(\w+)\s+in\s+range\((.+)\)\s*:/);
      if (forMatch) {
        const varName = forMatch[1];
        const rangeVal = evaluateExpression(forMatch[2], scope);
        let start = 0, stop = 0, step = 1;
        if (Array.isArray(rangeVal)) {
          if (rangeVal.length === 1) stop = Number(rangeVal[0]);
          else if (rangeVal.length === 2) { start = Number(rangeVal[0]); stop = Number(rangeVal[1]); }
          else { start = Number(rangeVal[0]); stop = Number(rangeVal[1]); step = Number(rangeVal[2]); }
        } else stop = Number(rangeVal);
        const indent = line.length - stripped.length;
        const bodyLines = [];
        i++;
        while (i < lines.length) {
          const l2 = lines[i];
          if (l2.trim() === '') { bodyLines.push(''); i++; continue; }
          if (l2.length - l2.trimStart().length <= indent) break;
          bodyLines.push(l2.slice(indent + 4));
          i++;
        }
        const body = bodyLines.join('\n');
        for (let v = start; step > 0 ? v < stop : v > stop; v += step) {
          interpret(body, actions, errors, { ...scope, __funcs__: scope.__funcs__, [varName]: v }, depth+1, limit);
        }
        continue;
      }
      const forInMatch = stripped.match(/^for\s+(\w+)\s+in\s+(.+)\s*:/);
      if (forInMatch) {
        const varName = forInMatch[1];
        const listVal = evaluateExpression(forInMatch[2], scope);
        const indent = line.length - stripped.length;
        const bodyLines = [];
        i++;
        while (i < lines.length) {
          const l2 = lines[i];
          if (l2.trim() === '') { bodyLines.push(''); i++; continue; }
          if (l2.length - l2.trimStart().length <= indent) break;
          bodyLines.push(l2.slice(indent + 4));
          i++;
        }
        const body = bodyLines.join('\n');
        if (Array.isArray(listVal)) {
          for (const item of listVal) {
            interpret(body, actions, errors, { ...scope, __funcs__: scope.__funcs__, [varName]: item }, depth+1, limit);
          }
        }
        continue;
      }
      const whileMatch = stripped.match(/^while\s+(.+)\s*:/);
      if (whileMatch) {
        const condition = whileMatch[1];
        const indent = line.length - stripped.length;
        const bodyLines = [];
        i++;
        while (i < lines.length) {
          const l2 = lines[i];
          if (l2.trim() === '') { bodyLines.push(''); i++; continue; }
          if (l2.length - l2.trimStart().length <= indent) break;
          bodyLines.push(l2.slice(indent + 4));
          i++;
        }
        const body = bodyLines.join('\n');
        let iter = 0;
        while (evaluateExpression(condition, scope) && iter < 200) {
          interpret(body, actions, errors, scope, depth+1, limit);
          iter++;
        }
        if (iter >= 200) errors.push('While loop exceeded 200 iterations');
        continue;
      }
      if (stripped.match(/^if\s+.+:/) || stripped.match(/^elif\s+.+:/) || stripped.match(/^else\s*:/)) {
        const indent = line.length - stripped.length;
        const blocks = [];
        let currentBlock = { cond: null, body: [] };
        while (i < lines.length) {
          const curLine = lines[i];
          const curStripped = curLine.trimStart();
          const curIndent = curLine.length - curStripped.length;
          if (curIndent < indent) break;
          const ifMatch = curStripped.match(/^(if|elif)\s+(.+):/);
          if (ifMatch && curIndent === indent) {
            if (currentBlock.cond !== null || currentBlock.body.length) blocks.push(currentBlock);
            currentBlock = { cond: ifMatch[2], body: [] };
          } else if (curStripped.match(/^else\s*:/) && curIndent === indent) {
            if (currentBlock.cond !== null || currentBlock.body.length) blocks.push(currentBlock);
            currentBlock = { cond: 'True', body: [] };
          } else if (curStripped !== '') {
            if (curIndent > indent) currentBlock.body.push(curLine.slice(indent + 4));
            else break;
          }
          i++;
        }
        if (currentBlock.body.length || currentBlock.cond !== null) blocks.push(currentBlock);
        let executed = false;
        for (const blk of blocks) {
          if (executed) break;
          const condVal = blk.cond === 'True' ? true : evaluateExpression(blk.cond, scope);
          if (condVal) {
            interpret(blk.body.join('\n'), actions, errors, scope, depth+1, limit);
            executed = true;
          }
        }
        continue;
      }
      const unpackMatch = stripped.match(/^([a-zA-Z_][a-zA-Z0-9_]*(?:\s*,\s*[a-zA-Z_][a-zA-Z0-9_]*)+)\s*=\s*(.+)$/);
      if (unpackMatch) {
        const names = unpackMatch[1].split(',').map(s => s.trim());
        const val = evaluateExpression(unpackMatch[2], scope);
        if (Array.isArray(val)) names.forEach((name, idx) => { scope[name] = val[idx] !== undefined ? val[idx] : null; });
        i++; continue;
      }
      const assignMatch = stripped.match(/^([a-zA-Z_][a-zA-Z0-9_]*(?:\[[^\]]+\])+)\s*=\s*(.+)$/);
      if (assignMatch) {
        assignValue(assignMatch[1], evaluateExpression(assignMatch[2], scope), scope);
        i++; continue;
      }
      const simpleAssign = stripped.match(/^([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*(.+)$/);
      if (simpleAssign) {
        scope[simpleAssign[1]] = evaluateExpression(simpleAssign[2], scope);
        i++; continue;
      }
      const printMatch = stripped.match(/^print\((.*)\)$/);
      if (printMatch) {
        const val = evaluateExpression(printMatch[1], scope);
        logConsole(Array.isArray(val) ? JSON.stringify(val) : String(val), 'log-line');
        i++; continue;
      }
      if (stripped === 'move_forward()') { actions.push('move_forward'); i++; continue; }
      if (stripped === 'turn_left()') { actions.push('turn_left'); i++; continue; }
      if (stripped === 'turn_right()') { actions.push('turn_right'); i++; continue; }
      if (stripped === 'pass') { i++; continue; }
      if (stripped !== '') errors.push(`Syntax error: "${stripped.substring(0,50)}"`);
      i++;
    }
  }

  function parseAndExecute(code) {
    const actions = [], errors = [];
    try { interpret(code, actions, errors, { __funcs__: {} }, 0, 500); } catch(e) { errors.push(e.message); }
    return { actions, errors };
  }

  // ==============================================================
  // EXECUTION ENGINE
  // ==============================================================
  const ACTION_DURATION = 800;

  function runCode() {
    if (state.running) return;
    const code = document.getElementById('code-input').value;
    if (!code.trim()) { logConsole('> No code.', 'log-warn'); return; }
    logConsole('> Compiling...', 'log-info');
    const { actions, errors } = parseAndExecute(code);
    if (errors.length) {
      errors.forEach(e => logConsole('⚠ ' + e, 'log-error'));
      logConsole('Execution halted.', 'log-warn');
      playError(state.pos.col, state.pos.row, 1000, null);
      return;
    }
    if (actions.length === 0) { logConsole('> No actions found.', 'log-warn'); return; }
    logConsole(`> Executing ${actions.length} actions...`, 'log-success');
    state.running = true;
    state.steps += actions.length;
    document.getElementById('btn-run').classList.add('running');
    document.getElementById('btn-run').textContent = '■ STOP';
    setStatus('RUNNING');

    const simPos = { ...state.pos };
    let simDir = state.dir;
    const simMoves = [];
    for (const act of actions) {
      if (act === 'turn_left') {
        const newDir = DIRS[(DIRS.indexOf(simDir)+3)%4];
        simMoves.push({ type: 'turn_left', pos: { ...simPos }, oldDir: simDir, newDir });
        simDir = newDir;
      } else if (act === 'turn_right') {
        const newDir = DIRS[(DIRS.indexOf(simDir)+1)%4];
        simMoves.push({ type: 'turn_right', pos: { ...simPos }, oldDir: simDir, newDir });
        simDir = newDir;
      } else if (act === 'move_forward') {
        const d = MOVE[simDir];
        const nc = simPos.col + d[0], nr = simPos.row + d[1];
        if (nc < 0 || nc > 3 || nr < 0 || nr > 3) {
          simMoves.push({ type: 'wall_bump', pos: { ...simPos }, dir: simDir });
        } else {
          const from = { ...simPos };
          simPos.col = nc; simPos.row = nr;
          simMoves.push({ type: 'move_forward', from, to: { ...simPos }, dir: simDir });
        }
      }
    }
    executeQueue(simMoves, 0, () => {
      state.running = false;
      document.getElementById('btn-run').classList.remove('running');
      document.getElementById('btn-run').textContent = '▶ RUN';
      setStatus('IDLE');
      logConsole(`> Finished at ${colName(state.pos.col)}${state.pos.row+1}`, 'log-info');
      checkWin();
    });
  }

  function executeQueue(moves, idx, done) {
    if (!state.running) { done(); return; }
    if (idx >= moves.length) { done(); return; }
    const move = moves[idx];
    document.getElementById('run-progress').style.width = (((idx+1)/moves.length)*100) + '%';
    if (move.type === 'move_forward') {
      logConsole(`  move_forward() → ${colName(move.to.col)}${move.to.row+1}`, 'log-exec');
      playMoveForward(move.from.col, move.from.row, move.dir, move.to.col, move.to.row, ACTION_DURATION, () => {
        state.pos = { ...move.to }; refreshUI(); executeQueue(moves, idx+1, done);
      });
    } else if (move.type === 'turn_left') {
      logConsole(`  turn_left() → ${DIR_NAMES[move.newDir]}`, 'log-exec');
      playTurnLeft(move.pos.col, move.pos.row, move.oldDir, move.newDir, ACTION_DURATION * 0.7, () => {
        state.dir = move.newDir; refreshUI(); executeQueue(moves, idx+1, done);
      });
    } else if (move.type === 'turn_right') {
      logConsole(`  turn_right() → ${DIR_NAMES[move.newDir]}`, 'log-exec');
      playTurnRight(move.pos.col, move.pos.row, move.oldDir, move.newDir, ACTION_DURATION * 0.7, () => {
        state.dir = move.newDir; refreshUI(); executeQueue(moves, idx+1, done);
      });
    } else if (move.type === 'wall_bump') {
      logConsole(`  move_forward() → BLOCKED!`, 'log-warn');
      playError(move.pos.col, move.pos.row, 600, () => executeQueue(moves, idx+1, done));
    }
  }

  function checkWin() {
    if (state.pos.col === state.goal.col && state.pos.row === state.goal.row) {
      playSuccess(state.pos.col, state.pos.row, 1500, () => {
        logConsole(`✦ TARGET REACHED! Level ${state.level} complete.`, 'log-success');
        showOverlay();
      });
    }
  }

  // ==============================================================
  // LEVELS & UTILITIES
  // ==============================================================
  function randomCell() { return { col: Math.floor(Math.random()*4), row: Math.floor(Math.random()*4) }; }
  function cellDist(a,b) { return Math.abs(a.col-b.col)+Math.abs(a.row-b.row); }
  function generateGoal(playerPos) {
    let goal;
    do { goal = randomCell(); } while ((goal.col===playerPos.col && goal.row===playerPos.row) || cellDist(goal, playerPos) <= 1);
    return goal;
  }

  function startLevel() {
    state.pos = { col:0, row:0 };
    state.dir = 'N';
    state.goal = generateGoal(state.pos);
    state.running = false;
    document.getElementById('run-progress').style.width = '0%';
    refreshUI();
    clearConsole();
    logConsole(`► LEVEL ${state.level} // H.U.M.A.N. ACTIVE`, 'log-info');
    logConsole(`  Start: ${colName(0)}1  |  Target: ${colName(state.goal.col)}${state.goal.row+1}`, 'log-warn');
    setStatus('IDLE');
    // Start idle video for the starting cell
    playIdleForCell(0, 0, 'N');
  }

  function nextLevel() { state.level++; hideOverlay(); startLevel(); }
  function showOverlay() { document.getElementById('overlay').classList.add('show'); }
  function hideOverlay() { document.getElementById('overlay').classList.remove('show'); }

  function logConsole(msg, cls='log-line') {
    const body = document.getElementById('console-body');
    const div = document.createElement('div'); div.className = cls; div.textContent = msg;
    body.appendChild(div); body.scrollTop = body.scrollHeight;
  }
  function clearConsole() { document.getElementById('console-body').innerHTML = ''; }
  function setStatus(s) {
    const el = document.getElementById('st-status');
    el.textContent = s;
    el.style.color = s==='RUNNING' ? 'var(--accent)' : 'var(--text)';
  }
  function resetCode() {
    document.getElementById('code-input').value = '';
    updateHighlight();
    updateLineNumbers();
  }

  // ==============================================================
  // EDITOR & SYNTAX HIGHLIGHT
  // ==============================================================
  function initEditor() {
    const ta = document.getElementById('code-input');
    ta.value = '';
    updateHighlight();
    updateLineNumbers();
    ta.addEventListener('input', () => { updateHighlight(); updateLineNumbers(); });
    ta.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const s = ta.selectionStart, end = ta.selectionEnd;
        ta.value = ta.value.slice(0, s) + '    ' + ta.value.slice(end);
        ta.selectionStart = ta.selectionEnd = s + 4;
        updateHighlight(); updateLineNumbers();
      }
      if (e.ctrlKey && e.key === 'Enter') runCode();
    });
    ta.addEventListener('scroll', () => {
      document.getElementById('code-highlight').scrollTop = ta.scrollTop;
      document.getElementById('code-highlight').scrollLeft = ta.scrollLeft;
      document.getElementById('line-numbers').scrollTop = ta.scrollTop;
    });
  }

  function updateLineNumbers() {
    const lines = (document.getElementById('code-input').value || '').split('\n');
    document.getElementById('line-numbers').innerHTML = lines.map((_,i) => `<div>${i+1}</div>`).join('');
  }

  function highlightSyntax(code) {
    const keywords = ['def','for','in','range','if','elif','else','while','and','or','not','return','True','False','None','pass','break','continue'];
    const builtins = ['move_forward','turn_left','turn_right','current_position','goal_position','print','len'];
    return code
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/(#[^\n]*)/g, '<span class="cm">$1</span>')
      .replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g, '<span class="str">$1</span>')
      .replace(/\b(\d+)\b/g, '<span class="num">$1</span>')
      .replace(new RegExp(`\\b(${builtins.join('|')})\\b`, 'g'), '<span class="builtin">$1</span>')
      .replace(new RegExp(`\\b(${keywords.join('|')})\\b`, 'g'), '<span class="kw">$1</span>');
  }

  function updateHighlight() {
    document.getElementById('code-highlight').innerHTML = highlightSyntax(document.getElementById('code-input').value || '');
  }

  // ==============================================================
  // INSTRUCTIONS
  // ==============================================================
  let instructionsClicked = false;
  const instructionsTab = document.getElementById('instructions-tab');
  function stopFlashing() { if (!instructionsClicked) { instructionsClicked = true; instructionsTab.classList.remove('tab-flash'); } }
  instructionsTab.classList.add('tab-flash');
  instructionsTab.addEventListener('click', () => { stopFlashing(); switchTab('instructions'); });

  function buildInstructions() {
    const container = document.getElementById('instructions-content');
    const sections = [
      { type: 'heading', text: 'MOVEMENT' },
      { type: 'lines', items: ['move_forward()   — move one cell in facing direction','turn_left()      — rotate 90° counter-clockwise','turn_right()     — rotate 90° clockwise']},
      { type: 'heading', text: 'VARIABLES' },
      { type: 'lines', items: ['current_position — returns [col, row]  e.g. [0, 2]','goal_position    — returns [col, row]  e.g. [3, 1]']},
      { type: 'heading', text: 'BUILT-INS' },
      { type: 'lines', items: ['len(x)           — length of a list','print(x)         — output to console','range(n)         — 0..n-1','range(a, b)      — a..b-1']},
      { type: 'heading', text: 'DATA STRUCTURES' },
      { type: 'lines', items: ['Lists:   x = []  /  x.append(v)  /  x.pop(0)','Tuples:  t = (1, 2)  — stored as lists internally','Unpack:  a, b = some_list','2D list: grid[i][j] = value','Test:    val in my_list   →  True/False','         val not in my_list']},
      { type: 'heading', text: 'CONTROL FLOW' },
      { type: 'lines', items: ['if / elif / else','for x in range(n)','for item in my_list','while condition','def my_func():   (no arguments)']},
      { type: 'heading', text: 'NOTES' },
      { type: 'lines', items: ['Max 500 actions per run.','Max 200 iterations per while loop.','Functions take no arguments.','Ctrl+Enter to run code.']},
    ];
    let html = '';
    for (const sec of sections) {
      if (sec.type === 'heading') html += `<div class="instr-heading">${escapeHtml(sec.text)}</div>`;
      else if (sec.type === 'lines') { sec.items.forEach(l => { html += `<div class="instr-line">${escapeHtml(l)}</div>`; }); html += '<div style="height:4px"></div>'; }
    }
    container.innerHTML = html;
  }

  function switchTab(tabId) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    const codePane = document.getElementById('code-pane');
    const instrPane = document.getElementById('instructions-pane');
    if (tabId === 'code') {
      codePane.classList.remove('hidden'); instrPane.classList.add('hidden');
      document.querySelector('.tab[data-tab="code"]').classList.add('active');
    } else {
      codePane.classList.add('hidden'); instrPane.classList.remove('hidden');
      document.querySelector('.tab[data-tab="instructions"]').classList.add('active');
    }
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }

  // ==============================================================
  // INIT
  // ==============================================================
  window.addEventListener('resize', () => { resizeCanvas(); drawGoalOverlay(); });
  document.addEventListener('DOMContentLoaded', () => {
    const container = document.getElementById('grid-container');
    const rect = container.getBoundingClientRect();
    canvas.width = rect.width; canvas.height = rect.height;
    ctx = canvas.getContext('2d');
    resizeCanvas();
    buildInstructions();
    initEditor();
    document.querySelectorAll('.tab').forEach(tab => {
      if (tab.getAttribute('data-tab') !== 'instructions') tab.addEventListener('click', () => switchTab(tab.dataset.tab));
    });
    document.querySelector('.tab[data-tab="code"]').addEventListener('click', () => { stopFlashing(); switchTab('code'); });
    document.getElementById('btn-run').addEventListener('click', () => {
      if (state.running) { state.running = false; document.getElementById('btn-run').classList.remove('running'); document.getElementById('btn-run').textContent = '▶ RUN'; setStatus('IDLE'); }
      else runCode();
    });
    document.getElementById('btn-clear').addEventListener('click', resetCode);
    document.getElementById('console-clear').addEventListener('click', clearConsole);
    startLevel();
    logConsole('  Ctrl+Enter to execute', 'log-line');
  });
</script>
</body>
